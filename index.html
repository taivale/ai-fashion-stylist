<title>AI Fashion Stylist</title>

<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#F7F4F0;color:#1A1410;
  -webkit-font-smoothing:antialiased;
}
:root{
  --bg:#F7F4F0;--sf:#FFFFFF;--sfAlt:#EFE9E2;
  --tx:#1A1410;--txS:#7A6A5E;--txM:#B0A49A;
  --ac:#B8825A;--acD:#96623A;--acL:#F2E6D8;
  --bd:#E2D5C8;--ok:#5A9870;--err:#C04040;
  --night:#2A1F1B;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',-apple-system,sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* ── ANIMATIONS ── */
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn {from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes pop    {0%{transform:scale(1)}50%{transform:scale(1.14)}100%{transform:scale(1)}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.4}}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:0;height:3px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

/* ── LAYOUT ── */
#app{
  max-width:430px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  overflow:hidden;position:relative;
  background:var(--bg);
}
#header{
  background:linear-gradient(160deg,var(--night) 0%,#3A2818 60%,var(--ac) 100%);
  padding:16px 18px 14px;
  padding-top:calc(16px + env(safe-area-inset-top,0px));
  flex-shrink:0;position:relative;z-index:50;
}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#nav{
  background:var(--sf);
  border-top:1px solid var(--bd);
  display:flex;flex-shrink:0;
  padding-bottom:calc(8px + var(--safe-bottom));
  position:relative;z-index:50;
}

/* ── HEADER ── */
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px}
.logo-star{color:var(--ac);font-size:17px;line-height:1}
.logo-text{font-family:var(--serif);font-size:20px;font-weight:700;color:#FFF;letter-spacing:.3px}
.hdr-add{width:36px;height:36px;border-radius:50%;background:var(--ac);color:#FFF;border:none;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;box-shadow:0 3px 12px rgba(184,130,90,.5);cursor:pointer}

/* ── NAV ── */
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 6px;background:none;border:none;color:var(--txM);font-size:10px;font-weight:400;cursor:pointer;transition:color .2s;font-family:var(--sans)}
.nav-btn.active{color:var(--ac)}
.nav-btn svg{display:block}

/* ── SCREEN ── */
.screen{padding:16px 16px 24px;animation:fadeUp .4s ease}

/* ── CARDS ── */
.card{background:var(--sf);border-radius:14px;box-shadow:0 2px 10px rgba(26,20,16,.05)}
.card-p{padding:18px}

/* ── BUTTONS ── */
.btn-primary{
  width:100%;padding:16px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--ac),var(--acD));
  color:#FFF;font-size:15px;font-weight:700;font-family:var(--sans);
  cursor:pointer;letter-spacing:.3px;
  box-shadow:0 5px 18px rgba(184,130,90,.4);
  transition:opacity .2s;
}
.btn-primary:disabled{background:var(--bd);color:var(--txM);box-shadow:none;cursor:not-allowed}
.btn-outline{
  width:100%;padding:14px;border-radius:50px;
  border:1.5px solid var(--ac);background:none;
  color:var(--ac);font-size:14px;font-weight:600;font-family:var(--sans);cursor:pointer;
}
.btn-ghost{background:none;border:none;color:var(--txS);font-family:var(--sans);cursor:pointer;font-size:13px}

/* ── CHIPS ── */
.chip{
  padding:7px 14px;border-radius:20px;
  border:1.5px solid var(--bd);background:var(--sf);
  color:var(--txS);font-size:13px;font-family:var(--sans);
  cursor:pointer;white-space:nowrap;transition:all .15s;
}
.chip.on{background:var(--ac);color:#FFF;border-color:var(--ac);font-weight:600}

/* ── TAGS ── */
.tag{font-size:11px;padding:3px 8px;background:var(--sfAlt);border-radius:20px;color:var(--txS)}

/* ── SPINNER ── */
.spinner{
  border:3px solid var(--bd);border-top-color:var(--ac);
  border-radius:50%;animation:spin .85s linear infinite;flex-shrink:0;
}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,20,16,.55);
  backdrop-filter:blur(4px);display:flex;flex-direction:column;
  justify-content:flex-end;z-index:200;
}
.modal-sheet{
  background:var(--sf);border-radius:22px 22px 0 0;
  max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  animation:slideUp .32s cubic-bezier(.32,.72,0,1);
}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:14px auto 0}
</style>
</head>

  return (r*299+g*587+b*114)/1000>155;
};

    const on = multi ? selected.includes(v) : selected===v;
    return `<button class="chip ${on?'on':''}" onclick="${onclick}('${v}')">${v}</button>`;

function goTab(tab) {
  STATE.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('nav-'+tab)?.classList.add('active');
  const titles = {wardrobe:'Meu Guarda-Roupa',stylist:'Stylist IA',cores:'Módulo de Cores',onboarding:'Início Rápido'};
  $('hdr-title').textContent = titles[tab]||'';
  $('hdr-add-btn').style.display = tab==='wardrobe'?'flex':'none';
  renderMain();
}

function renderWardrobe() {
  const g = STATE.garments;
  if (!g.length) return `
    <div class="screen" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 24px">
      <div style="width:80px;height:80px;border-radius:50%;background:var(--acL);display:flex;align-items:center;justify-content:center;margin:0 0 20px;font-size:36px">👗</div>

      <div style="display:flex;gap:10px;margin-bottom:14px">

        <button class="chip ${!filt?'on':''}" onclick="setWFilt('')">Tudo</button>

          <div class="card" style="overflow:hidden;animation:fadeUp .35s ease ${i*50}ms both;cursor:pointer" onclick="toggleDelete('${g.id}')">
            <div style="aspect-ratio:3/4;background:var(--sfAlt);position:relative;overflow:hidden">
              ${g.imageUrl?`<img src="${g.imageUrl}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none'">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">${g.shape?garmentSVG(g.shape,COR_HEX[g.cor],80):'<span style="font-size:32px">🧥</span>'}</div>`}
              ${STATE.deleteId===g.id?`<div style="position:absolute;inset:0;background:rgba(26,20,16,.65);display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease">
                <button onclick="removeGarment('${g.id}');event.stopPropagation()" style="padding:10px 20px;border-radius:50px;background:var(--err);color:#FFF;border:none;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer">🗑 Remover</button>
              </div>`:''}
            </div>
            <div style="padding:10px 12px 12px">
              <span style="font-size:13px;font-weight:700;display:block;margin-bottom:5px">${g.tipo}</span>
              <div style="display:flex;gap:5px;flex-wrap:wrap"><span class="tag">${g.cor}</span><span class="tag">${g.estilo}</span></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

function setWFilt(v){STATE.wFilt=v;renderMain()}
function toggleDelete(id){STATE.deleteId=STATE.deleteId===id?null:id;renderMain()}
function removeGarment(id){STATE.garments=STATE.garments.filter(g=>g.id!==id);STATE.deleteId=null;save();renderMain()}

      <p style="font-family:var(--serif);font-size:20px;font-weight:700">Analisando a peça...</p>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="font-family:var(--serif);font-size:20px;font-weight:700">Confirmar Classificação</h3>
        <button onclick="closeUpload()" style="background:none;border:none;color:var(--txS);font-size:24px;line-height:1;cursor:pointer">×</button>
      </div>
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px">
        <div style="width:84px;height:108px;border-radius:12px;overflow:hidden;background:var(--sfAlt);flex-shrink:0">

          </div>
          <p style="font-size:12px;color:var(--txS);line-height:1.5">Toque nas opções para corrigir qualquer campo.</p>

        <div style="display:flex;flex-wrap:wrap;gap:6px">${chips(OPCOES.tipo.slice(0,18),c.tipo,'setClsTipo')}</div>
      </div>
      <div style="margin-bottom:16px">
        <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--txS);margin-bottom:8px">Cor</p>

async function handleFileInput(e){
  const f=e.target.files?.[0];if(!f)return;
  STATE.uploadFile=f;
  STATE.uploadImageUrl=URL.createObjectURL(f);
  await classify();
}

async function useDemo(url){
  STATE.uploadImageUrl=url;
  STATE.uploadFile={name:'demo.jpg',type:'image/jpeg'};
  await classify();
}

async function classify(){
  STATE.uploadStep='classifying';renderUpload();
  await delay(1800);
  const tipos=OPCOES.tipo.slice(0,8),cores=OPCOES.cor.slice(0,10);
  STATE.uploadCls={
    tipo:tipos[Math.floor(Math.random()*tipos.length)],
    cor:cores[Math.floor(Math.random()*cores.length)],
    estilo:OPCOES.estilo[Math.floor(Math.random()*OPCOES.estilo.length)],
    ocasioes:[OPCOES.ocasiao[0],OPCOES.ocasiao[1]],
    confianca:'alta',
  };
  STATE.uploadStep='review';renderUpload();
}

function setClsTipo(v){STATE.uploadCls.tipo=v;renderUpload()}
function setClsCor(v){STATE.uploadCls.cor=v;renderUpload()}
function setClsEstilo(v){STATE.uploadCls.estilo=v;renderUpload()}
function toggleClsOcasiao(v){
  const oc=STATE.uploadCls.ocasioes;
  STATE.uploadCls.ocasioes=oc.includes(v)?oc.filter(o=>o!==v):[...oc,v];
  renderUpload();
}

function saveGarment(){
  const g={id:uid(),tipo:STATE.uploadCls.tipo,cor:STATE.uploadCls.cor,estilo:STATE.uploadCls.estilo,ocasioes:STATE.uploadCls.ocasioes,imageUrl:STATE.uploadImageUrl,createdAt:new Date().toISOString()};
  STATE.garments.unshift(g);save();
  closeUpload();renderMain();
}

function renderStylist(){

    <div class="screen" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:60px 24px">
      <div style="font-size:48px;margin-bottom:16px">✨</div>

      <p style="font-size:13px;color:var(--txM);margin-top:12px">${STATE.garments.length} de 3 peças</p>

  if(STATE.stylistPhase==='loading') return `
    <div class="screen" style="display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:14px">

  return `<div class="screen">

      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px">${chips(OPCOES.ocasiao,STATE.stylistOcasiao,'setStylistOcasiao')}</div>

      <div style="display:flex;gap:8px;margin-bottom:20px">

          <button onclick="setStylistClima('${c}')" style="flex:1;padding:12px 4px;border-radius:12px;border:1.5px solid ${STATE.stylistClima===c?'var(--ac)':'var(--bd)'};background:${STATE.stylistClima===c?'var(--acL)':'var(--sf)'};color:${STATE.stylistClima===c?'var(--acD)':'var(--txS)'};font-size:11px;font-weight:${STATE.stylistClima===c?700:400};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:var(--sans);transition:all .15s">

function renderStylistResult(){
  const looks=STATE.stylistLooks;
  const look=looks[STATE.stylistActive];
  if(!look) return '';
  const meta=MOOD_STYLE[look.humor]||{bg:'var(--sfAlt)',tx:'var(--txS)'};
  return `<div class="screen">
    <div style="display:flex;gap:3px;background:var(--sf);border-radius:14px;padding:4px;margin-bottom:12px;box-shadow:0 2px 8px rgba(26,20,16,.05)">
      ${looks.map((l,i)=>`<button onclick="setStylistActive(${i})" style="flex:1;padding:10px 4px;border:none;border-radius:10px;background:${STATE.stylistActive===i?'var(--ac)':'transparent'};color:${STATE.stylistActive===i?'#FFF':'var(--txM)'};font-size:13px;font-weight:${STATE.stylistActive===i?700:400};cursor:pointer;font-family:var(--sans);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px">Look ${i+1} ${STATE.stylistLiked.has(i)?'♥':''}</button>`).join('')}
    </div>
    <div class="card" style="overflow:hidden;animation:fadeUp .3s ease">

function setStylistOcasiao(v){STATE.stylistOcasiao=v;renderMain()}

async function gerarLooks(){
  STATE.stylistPhase='loading';renderMain();
  await delay(2000);
  const g=STATE.garments;
  const sh=[...g].sort(()=>Math.random()-.5);
  const exps=[
    `Composição equilibrada para ${STATE.stylistOcasiao.toLowerCase()}. Paleta coesa — nada compete, tudo conversa. O tipo de look que parece fácil mas tem muito pensamento por trás.`,
    `O segredo está na proporção: estrutura em cima, leveza embaixo. Ideal para clima ${STATE.stylistClima.toLowerCase()} sem abrir mão do estilo.`,
    `Look moderno que transmite confiança sem exagero. As peças dialogam em estilo e criam uma silhueta elegante.`,
  ];
  const dicas=['Um cinto fino definiria a cintura e completaria o look.','Brincos médios em dourado elevariam o conjunto sem esforço.','Uma bolsa estruturada completaria a silhueta com sofisticação.'];
  const humores=['Clássico','Casual elegante','Moderno'];
  STATE.stylistLooks=[0,1,2].map(i=>({humor:humores[i],explicacao:exps[i],dica:dicas[i],pieces:sh.slice(i*2,i*2+3).filter(Boolean)})).filter(l=>l.pieces.length>0);
  STATE.stylistActive=0;STATE.stylistPhase='result';renderMain();
}

function setCoresTab(t){STATE.coresTab=t;renderMain()}
function setCoresGrupo(g){STATE.coresGrupo=g;renderMain()}
function setCoresHarmonia(h){STATE.coresHarmonia=h;renderMain()}
function toggleCorSel(id){const c=PANTONE.find(p=>p.id===id);STATE.coresSelected=STATE.coresSelected?.id===id?null:c;renderMain()}
function toggleBuilder(id){
  const c=PANTONE.find(p=>p.id===id);
  if(!c)return;
  if(STATE.builderCores.some(x=>x.id===id)){STATE.builderCores=STATE.builderCores.filter(x=>x.id!==id);}
  else if(STATE.builderCores.length<4){STATE.builderCores.push(c);}
  else{STATE.builderMsg='Máximo 4 cores';setTimeout(()=>{STATE.builderMsg='';renderMain()},1500);}
  renderMain();
}
function limparBuilder(){STATE.builderCores=[];STATE.builderMsg='';renderMain()}
function avaliarBuilder(){
  const bc=STATE.builderCores;if(bc.length<2){STATE.builderMsg='Selecione pelo menos 2 cores';renderMain();return;}
  const grupos=bc.map(c=>c.grupo),uniq=[...new Set(grupos)];
  let msg='';
  if(uniq.length===1) msg='✦ MONOCROMÁTICO — elegância máxima. Varie as texturas para criar profundidade.';
  else if(grupos.includes('Neutro')&&uniq.length===2) msg=`✦ Neutro + Cor — look certeiro. ${bc.find(c=>c.grupo!=='Neutro')?.nome} é seu ponto focal.`;
  else if(uniq.length>=3&&!grupos.includes('Neutro')) msg=`✦ COLOR BLOCKING SS 2026! ${bc.length} blocos de cor. Use peças sólidas e acessórios neutros.`;
  else msg='✦ Combinação harmoniosa. Deixe uma cor dominar (70%) e a outra aparecer (30%).';
  STATE.builderMsg=msg;renderMain();
}

            <div style="display:flex;align-items:center;gap:8px">
              ${garmentSVG(peca.shape,coresSel.length>0?(COR_HEX[coresSel[coresSel.length-1]]||'#D4B896'):'#E2D5C8',isExp?68:52)}
              ${coresSel.length>0?`<div style="display:flex;flex-wrap:wrap;gap:4px">${coresSel.map(c=>`<div style="width:16px;height:16px;border-radius:50%;background:${COR_HEX[c]||'#ccc'};border:1.5px solid rgba(0,0,0,.12)" title="${c}"></div>`).join('')}</div>`:`<p style="font-size:11px;color:var(--txM)">Toque para escolher</p>`}
            </div>
          </div>
          ${isExp?`<div style="padding:0 14px 16px;animation:fadeIn .2s ease">
            <p style="font-size:11px;font-weight:700;color:var(--txS);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Cores que você tem:</p>
            <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px">
              ${peca.cores.map(cor=>{
                const sel=!!STATE.onbSelecoes[peca.id+'__'+cor];
                const hex=COR_HEX[cor]||'#CCC';
                const wh=cor==='Branco'||cor==='Off-white';
                return `<button onclick="toggleOnbCor('${peca.id}','${cor}')" style="display:flex;align-items:center;gap:6px;padding:7px 11px 7px 7px;border-radius:20px;border:2px solid ${sel?'var(--ac)':'var(--bd)'};background:${sel?'var(--acL)':'var(--sf)'};cursor:pointer;transition:all .15s;${sel?'animation:pop .25s ease':''}">
                  <div style="width:18px;height:18px;border-radius:50%;background:${hex};border:1.5px solid ${wh?'var(--bd)':'rgba(0,0,0,.1)'};flex-shrink:0"></div>
                  <span style="font-size:12px;font-weight:${sel?700:400};color:${sel?'var(--acD)':'var(--txS)'};white-space:nowrap">${cor}</span>
                  ${sel?`<span style="font-size:11px;color:var(--ac)">✓</span>`:''}
                </button>`;
              }).join('')}
            </div>
            <button onclick="toggleOnbExpand('${peca.id}')" style="width:100%;padding:9px;border-radius:9px;border:1px solid var(--bd);background:var(--sfAlt);color:var(--txS);font-size:12px;font-weight:500;font-family:var(--sans);cursor:pointer">Fechar ↑</button>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 28%);z-index:40">
      ${total===0?`<p style="text-align:center;font-size:13px;color:var(--txM);margin-bottom:10px">Selecione pelo menos uma peça</p>`:`<p style="text-align:center;font-size:13px;color:var(--txS);margin-bottom:10px;font-weight:500"><span style="color:var(--ac);font-weight:700">${total} peça${total!==1?'s':''}</span> selecionada${total!==1?'s':''}</p>`}
      <div style="display:flex;gap:10px">
        <button onclick="STATE.onbStep='intro';renderMain()" style="padding:13px 18px;border-radius:50px;border:1.5px solid var(--bd);background:var(--sf);color:var(--txS);font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer">← Voltar</button>
        <button ${total===0?'disabled':''} onclick="salvarOnboarding()" class="btn-primary" style="flex:1;padding:14px;font-size:14px">${total>0?`Salvar ${total} peças →`:'Selecione peças'}</button>
      </div>
    </div>
  </div>`;
}

function renderOnbSummary(){
  const garments=Object.values(STATE.onbSelecoes);
  return `<div class="screen" style="animation:fadeUp .4s ease;text-align:center;padding-top:40px">
    <div style="font-size:48px;margin-bottom:14px">🎉</div>
    <h2 style="font-family:var(--serif);font-size:28px;font-weight:700;margin-bottom:6px">Guarda-roupa criado!</h2>
    <p style="font-size:14px;color:var(--txS);margin-bottom:24px">${garments.length} peças adicionadas</p>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;text-align:center">
      ${garments.map((g,i)=>`
        <div class="card" style="padding:12px 8px;animation:fadeUp .35s ease ${i*35}ms both">
          ${garmentSVG(g.shape,COR_HEX[g.cor],54)}
          <p style="font-size:10px;font-weight:700;color:var(--tx);margin-top:6px;line-height:1.3">${g.label}</p>
          <p style="font-size:9px;color:var(--txS)">${g.cor}</p>
        </div>`).join('')}
    </div>
    <button class="btn-outline" style="margin-bottom:10px" onclick="STATE.onbStep='pick';renderMain()">← Editar seleção</button>
    <button class="btn-primary" onclick="goTab('wardrobe')">Ver meu guarda-roupa →</button>
  </div>`;
}

function setOnbCat(cat){STATE.onbCatAtiva=cat;STATE.onbExpanded=null;renderMain()}
function toggleOnbExpand(id){STATE.onbExpanded=STATE.onbExpanded===id?null:id;renderMain()}
function toggleOnbCor(pecaId,cor){
  const key=pecaId+'__'+cor;
  const peca=CATALOG.find(p=>p.id===pecaId);
  if(!peca)return;
  if(STATE.onbSelecoes[key]){delete STATE.onbSelecoes[key];}
  else {
    STATE.onbSelecoes[key]={
      id:uid(),tipo:peca.tipo,label:peca.label,cor,
      estilo:peca.estilo,ocasioes:peca.ocasioes,
      clima:peca.clima,shape:peca.shape,isPreset:true,
      imageUrl:null,createdAt:new Date().toISOString()
    };
    STATE.onbExpanded=null;
  }
  renderMain();
}

function salvarOnboarding(){
  const garments=Object.values(STATE.onbSelecoes).map(g=>({...g,id:uid()}));
  STATE.garments=[...garments,...STATE.garments];
  save();
  STATE.onbStep='summary';
  renderMain();
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
goTab('wardrobe');
</script>
</body>
</html>
